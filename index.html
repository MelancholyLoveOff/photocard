<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Melancholy Love - Post Generator</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* --- TEMA CUTE & EMO (Pastel Goth / Punk Neobrutalism) --- */
    :root {
      --color-melancholy-love: #FF69B4; 
      --color-love: #E60000;            
      --color-melancholy: #8A2BE2;      
      
      --primary: var(--color-melancholy-love); 
      --primary-light: #FFB6C1;     
      --black: #111111; 
      --white: #ffffff; 
      --bg: #FFF0F5;
      
      --border: 3px solid var(--black); 
      --border-dashed: 3px dashed var(--black);
      --shadow: 5px 5px 0px var(--black); 
    }

    * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
    
    body { 
      background-color: #333; /* Fundo escuro para a área de trabalho */
      font-family: 'Roboto', sans-serif; 
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    
    h1, h2, h3, h4, .font-head { font-family: 'Montserrat', sans-serif; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; font-style: italic; }

    /* CONTROLES DO GERADOR */
    .control-panel {
      background: #fff;
      border: var(--border);
      box-shadow: var(--shadow);
      padding: 20px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .control-panel select {
      width: 100%;
      padding: 12px;
      border: var(--border);
      font-family: 'Roboto', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 2px 2px 0 #000;
    }

    .btn-download {
      background: #00FF00;
      color: #000;
      border: var(--border);
      padding: 15px;
      font-weight: 900;
      font-size: 1.1rem;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: 0.1s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }
    .btn-download:active { transform: translate(3px, 3px); box-shadow: none; }

    /* =========================================
       A ÁREA DO POST (O que será exportado)
       ========================================= */
    #export-wrapper {
      width: 500px;
      min-height: 500px; /* Mantém o formato quadrado como base */
      height: auto; /* Permite crescer infinito para baixo */
      background-color: var(--bg);
      background-image: linear-gradient(var(--primary-light) 1px, transparent 1px), linear-gradient(90deg, var(--primary-light) 1px, transparent 1px);
      background-size: 20px 20px;
      position: relative;
      overflow: hidden;
      border: 4px solid #000;
    }

    .post-header {
      background: #000;
      color: #fff;
      padding: 15px;
      text-align: center;
      border-bottom: 4px solid var(--primary);
    }
    .post-logo {
      font-family: 'Montserrat', sans-serif; 
      font-weight: 900; 
      font-size: 1.4rem; 
      letter-spacing: -1px;
    }
    .post-logo span {
      background: var(--primary);
      color: #000;
      padding: 2px 8px;
      margin-left: 5px;
      font-style: normal;
      transform: rotate(-3deg);
      display: inline-block;
    }

    .post-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .post-idol-box {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 20px;
      z-index: 2;
    }

    .post-avatar {
      width: 160px;
      height: 160px;
      border: 4px solid var(--primary);
      background: #000;
      object-fit: cover;
      box-shadow: 6px 6px 0 #000;
    }

    .post-info {
      flex: 1;
    }
    .post-name {
      font-size: 2.2rem;
      color: #000;
      line-height: 1;
      margin-bottom: 5px;
    }
    .post-tag {
      background: var(--primary);
      color: #fff;
      font-weight: 900;
      font-size: 0.8rem;
      padding: 4px 10px;
      display: inline-block;
      border: 2px solid #000;
      text-transform: uppercase;
      margin-bottom: 10px;
      box-shadow: 2px 2px 0 #000;
    }
    .post-bio {
      font-size: 0.85rem;
      font-weight: 700;
      line-height: 1.4;
      background: #fff;
      border: var(--border-dashed);
      padding: 10px;
      color: #000;
    }

    .post-history {
      background: #fff;
      border: var(--border);
      padding: 15px;
      box-shadow: 4px 4px 0 #000;
      flex: 1;
      z-index: 2;
    }
    .post-history-title {
      font-size: 1.1rem;
      background: #000;
      color: var(--primary);
      display: inline-block;
      padding: 4px 10px;
      margin-bottom: 15px;
    }
    
    .timeline-container {
      /* Sistema de multi-colunas: se tiver muitos itens, ele divide em dois painéis */
      column-width: 200px;
      column-gap: 20px;
    }

    .t-item { 
      position: relative; 
      margin-bottom: 12px; 
      font-size: 0.8rem; 
      font-weight: 900; 
      text-transform: uppercase;
      border-left: 3px solid #000; 
      padding-left: 15px; 
      margin-left: 5px;
      break-inside: avoid; /* Evita que um item separe na metade da coluna */
    }
    .t-item::before { content: ''; position: absolute; left: -9px; top: 0px; width: 12px; height: 12px; background: var(--primary); border: 3px solid #000;}
    .t-date { font-size: 0.7rem; color: #fff; background: #000; padding: 2px 5px; display: inline-block; margin-bottom: 3px;}

    /* Elementos decorativos no fundo da arte */
    .decor-x { position: absolute; font-weight: 900; font-size: 8rem; color: rgba(0,0,0,0.05); top: 50%; right: -20px; z-index: 1; line-height: 0; pointer-events: none;}
    .decor-skull { position: absolute; font-size: 4rem; color: var(--primary); opacity: 0.2; bottom: 20px; right: 20px; z-index: 1; pointer-events: none;}

    /* Responsive scale for desktop view */
    @media (max-width: 550px) {
      #export-wrapper { transform: scale(0.65); transform-origin: top center; margin-bottom: -150px;}
    }
  </style>
</head>
<body>

  <div class="control-panel">
    <h2 class="font-head" style="text-align: center;"><i class="fas fa-camera-retro"></i> Post Generator</h2>
    
    <label style="font-weight: 900; font-size: 0.8rem; text-transform: uppercase;">Selecione a Idol:</label>
    <select id="member-select" onchange="renderPostCard()"></select>

    <button class="btn-download" onclick="downloadPost()"><i class="fas fa-download"></i> Baixar Pôster (PNG)</button>
  </div>

  <div id="export-wrapper">
    <div class="post-header">
      <div class="post-logo">MELANCHOLY<span id="post-logo-span">LOVE <i class="fas fa-heart"></i></span></div>
    </div>
    
    <div class="decor-x">X</div>
    <div class="decor-skull"><i class="fas fa-skull"></i></div>

    <div class="post-content">
      
      <div class="post-idol-box">
        <img id="p-avatar" class="post-avatar" src="" crossorigin="anonymous">
        <div class="post-info">
          <h2 id="p-name" class="font-head post-name">Nome</h2>
          <div id="p-unit" class="post-tag">Unit</div>
          <div id="p-bio" class="post-bio">Bio aqui...</div>
        </div>
      </div>

      <div class="post-history">
        <h4 class="font-head post-history-title"><i class="fas fa-history"></i> Histórico</h4>
        <div id="p-history" class="timeline-container">
            </div>
      </div>

    </div>
  </div>

  <script>
    // --- SUPABASE SETUP ---
    var supaUrl = 'https://cotzdfxjazojpwpmkoss.supabase.co';
    var supaKey = 'sb_publishable_vF3JVZw3vDrfLM5M6xtw_w_0VJh7uwm';
    var db = window.supabase.createClient(supaUrl, supaKey);

    var loadedMembers = [];

    const pImg = (name, unit) => {
        let hexCol = 'FF69B4'; 
        if (unit === 'Melancholy') hexCol = '8A2BE2'; 
        else if (unit === 'Love') hexCol = 'E60000'; 
        let cleanName = name.replace(/<[^>]*>?/gm, '').trim().substring(0,3).toUpperCase();
        return `https://ui-avatars.com/api/?name=${encodeURIComponent(cleanName)}&background=${hexCol}&color=111&size=200&font-size=0.33&bold=true`;
    };

    async function init() {
        try {
            const { data, error } = await db.from('members').select('*').order('created_at', { ascending: true });
            if(data && data.length > 0) {
                loadedMembers = data.map(m => ({ id: m.id, Nome: m.nome, Geracao: m.geracao, Foto: m.foto, SubUnit: m.subunit, Status: m.status, Perfil: m.perfil, Historico_Times: typeof m.historico_times === 'string' ? m.historico_times : JSON.stringify(m.historico_times || []) }));
            }
        } catch(e) { 
            console.warn("DB error. Fallback to mock.", e); 
            loadedMembers = [
                { Nome: "Yua <i class='fas fa-skull'></i>", SubUnit: "Love", Foto: pImg("YUA", "Love"), Perfil: "A center misteriosa.", Historico_Times: '[{"data":"Nov 2023", "para":"Entrou para Unit: Love"}, {"data":"Dez 2023", "para":"Debut Oficial"}]' }
            ];
        } finally {
            populateSelect();
        }
    }

    function populateSelect() {
        const select = document.getElementById("member-select");
        select.innerHTML = '<option value="" disabled selected>-- Escolha --</option>';
        
        loadedMembers.forEach((m, idx) => {
            if(['graduada','demitida'].includes(m.Status?.toLowerCase())) return; 
            let cleanName = m.Nome.replace(/<[^>]*>?/gm, '').trim();
            select.innerHTML += `<option value="${idx}">${cleanName} (${m.SubUnit})</option>`;
        });
    }

    function renderPostCard() {
        const idx = document.getElementById("member-select").value;
        if(idx === "") return;
        const m = loadedMembers[idx];
        
        const root = document.getElementById('export-wrapper');
        const logoSpan = document.getElementById('post-logo-span');
        let themeColor = '#FF69B4'; 
        let themeLight = '#FFB6C1';
        
        if(m.SubUnit === 'Melancholy') {
            themeColor = '#8A2BE2'; themeLight = '#D8BFD8';
            logoSpan.innerHTML = 'MELANCHOLY <i class="fas fa-skull"></i>';
        } else if (m.SubUnit === 'Love') {
            themeColor = '#E60000'; themeLight = '#FFCCCC';
            logoSpan.innerHTML = 'LOVE <i class="fas fa-heart"></i>';
        } else {
            logoSpan.innerHTML = 'LOVE <i class="fas fa-heart"></i>';
        }

        root.style.setProperty('--primary', themeColor);
        root.style.setProperty('--primary-light', themeLight);

        document.getElementById("p-name").innerHTML = m.Nome;
        document.getElementById("p-unit").innerHTML = `<i class="fas fa-star"></i> ${m.SubUnit} / ${m.Geracao}`;
        
        const imgEl = document.getElementById("p-avatar");
        imgEl.setAttribute('crossorigin', 'anonymous');
        imgEl.src = m.Foto || pImg(m.Nome, m.SubUnit);

        document.getElementById("p-bio").innerHTML = m.Perfil ? m.Perfil.substring(0, 100) + (m.Perfil.length > 100 ? '...' : '') : "Sem bio.";

        let th = []; try { th = JSON.parse(m.Historico_Times || "[]"); } catch(e){}
        
        const mm = { 'Jan':1, 'Fev':2, 'Mar':3, 'Abr':4, 'Mai':5, 'Jun':6, 'Jul':7, 'Ago':8, 'Set':9, 'Out':10, 'Nov':11, 'Dez':12 };
        th.sort((a,b) => {
            let aP=(a.data||'').split(' '), bP=(b.data||'').split(' ');
            let yA=parseInt(aP[1])||0, yB=parseInt(bP[1])||0;
            return yA!==yB ? yB-yA : (mm[bP[0]]||0) - (mm[aP[0]]||0);
        });

        // Alterado para mostrar a timeline inteira (removido o slice)
        let displayHist = th;
        const histEl = document.getElementById("p-history");
        
        if(displayHist.length === 0) {
            histEl.innerHTML = `<div style="color:#000; font-weight:bold;">Ainda construindo sua história.</div>`;
        } else {
            histEl.innerHTML = displayHist.map(h => `<div class="t-item"><span class="t-date">${h.data}</span><br>${h.para}</div>`).join('');
        }
    }

    function downloadPost() {
        if(document.getElementById("member-select").value === "") {
            alert("Selecione uma Idol primeiro!");
            return;
        }

        const wrapper = document.getElementById("export-wrapper");
        const btn = document.querySelector(".btn-download");
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gerando...';

        html2canvas(wrapper, {
            scale: 2, 
            useCORS: true, 
            backgroundColor: null
        }).then(canvas => {
            let link = document.createElement('a');
            link.download = `Post_${document.getElementById('p-name').innerText.replace(/<[^>]*>?/gm, '').trim()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            btn.innerHTML = '<i class="fas fa-download"></i> Baixar Pôster (PNG)';
        }).catch(err => {
            console.error(err);
            alert("Erro ao gerar a imagem. Verifique o console.");
            btn.innerHTML = '<i class="fas fa-download"></i> Baixar Pôster (PNG)';
        });
    }

    init();
  </script>
</body>
</html>
