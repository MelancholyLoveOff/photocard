<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAP48 - Photocard Studio</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto:wght@400;500;700;900&family=Kalam:wght@400;700&family=Delius&family=Homemade+Apple&family=Tangerine:wght@400;700&family=Amatic+SC:wght@700&family=Patrick+Hand&family=Just+Another+Hand&family=Rouge+Script&family=Pacifico&family=Great+Vibes&family=Sacramento&family=Parisienne&family=Dancing+Script:wght@700&family=Permanent+Marker&family=Caveat+Brush&family=Kaushan+Script&family=Rock+Salt&family=Gochi+Hand&family=Cabin+Sketch:wght@700&family=Fredericka+the+Great&family=Love+Ya+Like+A+Sister&family=Walter+Turncoat&family=Delicious+Handrawn&display=swap" rel="stylesheet">
    
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        :root { 
            --primary: #8ACE00; 
            --black: #000000; 
            --bg: #f4f4f4; 
            --border: 2px solid #000; 
            --shadow: 4px 4px 0px #000; 
            --radius: 16px; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body { 
            background-color: var(--bg); 
            color: var(--black); 
            font-family: 'Roboto', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        h1, h2, h3, .font-head { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: -0.5px; 
        }

        .header-logo { 
            font-size: 2rem; 
            font-weight: 900; 
            font-style: italic; 
            margin-bottom: 20px; 
            text-align: center; 
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
        }
        
        .header-logo span { color: var(--primary); }
        .header-subtitle { display: block; font-size: 1rem; color: #555; font-style: normal; margin-top: -5px;}

        .studio-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1000px;
            width: 100%;
        }

        /* Painel de Controles */
        .controls {
            background: #fff;
            border: var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 25px 20px;
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label { 
            display: block; 
            font-size: 0.75rem; 
            font-weight: 900;
            color: #555; 
            margin-bottom: 2px; 
            text-transform: uppercase;
        }

        input[type="text"], input[type="file"], select, input[type="range"] { 
            width: 100%; 
            padding: 10px; 
            border: var(--border); 
            border-radius: 8px; 
            font-family: inherit; 
            font-weight: 700; 
            font-size: 0.9rem; 
            background: #fafafa; 
            transition: 0.2s; 
            cursor: pointer;
        }

        select optgroup {
            font-family: 'Roboto', sans-serif;
            font-weight: 900;
            background: #eee;
        }

        select option {
            background: #fff;
            font-weight: normal;
        }

        input[type="text"]:focus, select:focus { 
            background: #fff; 
            border-color: var(--primary); 
        }

        input[type="color"] {
            border: var(--border);
            border-radius: 8px;
            height: 40px;
            padding: 2px;
            cursor: pointer;
            background: #fff;
            width: 100%;
        }

        /* Ajuste do checkbox */
        input[type="checkbox"] {
            width: auto;
            height: auto;
            cursor: pointer;
            accent-color: var(--primary);
        }

        button { 
            background: var(--primary); 
            color: var(--black); 
            border: var(--border); 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: 900; 
            font-size: 1rem; 
            width: 100%; 
            cursor: pointer; 
            box-shadow: 2px 2px 0 #000; 
            text-transform: uppercase; 
            transition: transform 0.1s; 
            font-family: 'Montserrat', sans-serif;
        }

        button:active { 
            transform: scale(0.98); 
            box-shadow: 0 0 0 #000; 
        }

        .btn-download { 
            background: var(--black); 
            color: var(--primary); 
            margin-top: 10px; 
            font-size: 1.1rem; 
            padding: 15px;
        }

        .stickers-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .sticker-btn {
            background: #fff;
            font-size: 20px;
            padding: 5px;
            border-radius: 8px;
            box-shadow: 2px 2px 0 #000;
        }

        hr {
            border: 0;
            border-top: 2px dashed #ccc;
            margin: 5px 0;
        }

        /* --- ÁREA DO PHOTOCARD --- */
        .preview-area {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photocard {
            width: 320px;
            position: relative;
            overflow: hidden;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1); 
            transition: all 0.3s ease;
            background-color: #ffffff;
        }

        /* Molduras Originais */
        .frame-polaroid { 
            height: auto; 
            border-radius: 4px; 
            padding: 20px 20px 90px 20px; 
            border: var(--border); 
        }
        .frame-polaroid .photo-container {
            height: 280px; 
            border-radius: 2px;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .frame-kpop { height: 480px; border-radius: var(--radius); padding: 0; border: 8px solid white; box-shadow: var(--shadow); }
        .frame-dark { height: 480px; border-radius: var(--radius); padding: 0; border: 8px solid #222; background-color: #222 !important; }

        /* MOLDURAS NOVAS */
        .frame-pastel { 
            height: 480px; 
            border-radius: var(--radius); 
            padding: 0; 
            border: 8px solid #ffb7b2; 
            box-shadow: var(--shadow); 
            background-color: #e2f0cb; 
        }
        
        .frame-gradient {
            height: 480px;
            border-radius: var(--radius);
            padding: 8px; 
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            box-shadow: var(--shadow);
        }

        .frame-holographic {
            height: 480px;
            border-radius: var(--radius);
            padding: 8px;
            background: linear-gradient(124deg, #ff2400, #e81d1d, #e8b71d, #e3e81d, #1de840, #1ddde8, #2b1de8, #dd00f3, #dd00f3);
            background-size: 400% 400%;
            box-shadow: var(--shadow);
        }

        .photo-container {
            width: 100%;
            height: 100%;
            border-radius: inherit;
            overflow: hidden;
            position: relative;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-weight: bold;
        }

        .photo {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transform-origin: center;
        }

        .frame-overlay-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        /* Elementos Arrastáveis */
        .draggable {
            position: absolute;
            cursor: grab;
            user-select: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .draggable:active { cursor: grabbing; }

        .ui-controls {
            position: absolute;
            top: -20px;
            right: -40px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            opacity: 0;
            transition: 0.2s;
        }

        .draggable:hover .ui-controls { opacity: 1; }

        .btn-action {
            background: #fff;
            color: #000;
            border: 2px solid #000;
            border-radius: 4px;
            width: 24px;
            height: 24px;
            font-size: 16px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 2px 2px 0 rgba(0,0,0,1);
            font-family: 'Montserrat', sans-serif;
        }

        .btn-action:active { transform: scale(0.9); box-shadow: 0 0 0 rgba(0,0,0,1); }
        .btn-action.delete { background: #ff4d4d; color: white;}
        .hide-for-print .ui-controls { display: none !important; }

    </style>
</head>
<body>

    <div class="header-logo">
        ZAP<span>48</span>
        <span class="header-subtitle">Photocard Studio</span>
    </div>

    <div class="studio-container">
        
        <aside class="controls">
            
            <div class="control-group">
                <label>📸 Foto Base</label>
                <input type="file" id="upload" accept="image/*">
                <input type="range" id="photoZoom" min="0.5" max="3" step="0.1" value="1" style="margin-top: 5px;">
            </div>

            <hr>

            <div class="control-group">
                <label>🖼️ Formato e Cor do Card</label>
                <select id="frameSelect" style="margin-bottom: 5px;">
                    <optgroup label="Originais">
                        <option value="frame-polaroid">Polaroid Clássica (Quadrada)</option>
                        <option value="frame-kpop">K-Pop Album (Retrato Branco)</option>
                        <option value="frame-dark">Dark Mode (Borda Preta)</option>
                    </optgroup>
                    <optgroup label="Novas Molduras">
                        <option value="frame-pastel">Kawaii Pastel (Rosa e Verde)</option>
                        <option value="frame-gradient">Sunset Gradient (Rosa/Laranja)</option>
                        <option value="frame-holographic">Holográfica Especial</option>
                    </optgroup>
                </select>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label style="margin:0; font-size: 0.7rem;">Cor Fundo/Borda:</label>
                    <input type="color" id="cardBgColor" value="#ffffff" style="flex: 1; height: 35px;">
                </div>
            </div>

            <div class="control-group">
                <label>🎀 Moldura Transparente (PNG)</label>
                <input type="file" id="uploadFrame" accept="image/png, image/webp, image/gif">
            </div>

            <hr>

            <div class="control-group">
                <label>✍️ Fonte, Texto e Borda</label>
                <select id="fontSelect" style="margin-bottom: 5px; font-size: 1rem;">
                    
                    <optgroup label="✨ Assinatura de Idol (Elegantes)">
                        <option value="'Pacifico'" style="font-family: 'Pacifico'">Pacifico (Casual/Amigável)</option>
                        <option value="'Great Vibes'" style="font-family: 'Great Vibes'">Estilo Autography (Assinatura)</option>
                        <option value="'Parisienne'" style="font-family: 'Parisienne'">Estilo Brittany (Celebridade)</option>
                        <option value="'Sacramento'" style="font-family: 'Sacramento'">Estilo Amsterdam (Moderna)</option>
                        <option value="'Dancing Script'" style="font-family: 'Dancing Script'">Estilo Hello Honey (Suave)</option>
                        <option value="'Rouge Script'" style="font-family: 'Rouge Script'">Rouge Script (Clássica)</option>
                    </optgroup>

                    <optgroup label="🖌️ Estilo Pincel / Marker (K-Pop)">
                        <option value="'Caveat Brush'" style="font-family: 'Caveat Brush'">Estilo Brusher (Pincel Forte)</option>
                        <option value="'Permanent Marker'" style="font-family: 'Permanent Marker'">Estilo Playlist (Música/Pop)</option>
                        <option value="'Kaushan Script'" style="font-family: 'Kaushan Script'">Estilo Selima (Artístico)</option>
                        <option value="'Rock Salt'" style="font-family: 'Rock Salt'">Estilo Bromello (Brush Moderno)</option>
                        <option value="'Gochi Hand'" style="font-family: 'Gochi Hand'">Estilo Wild Youth (Divertido)</option>
                    </optgroup>

                    <optgroup label="🧑‍🏫 Estilo Giz / Quadro">
                        <option value="'Cabin Sketch'" style="font-family: 'Cabin Sketch'">Estilo Eraser (Lousa Clássica)</option>
                        <option value="'Fredericka the Great'" style="font-family: 'Fredericka the Great'">Estilo Chalktastic (Escolar)</option>
                        <option value="'Love Ya Like A Sister'" style="font-family: 'Love Ya Like A Sister'">Estilo KG Second (Desenhada)</option>
                        <option value="'Delicious Handrawn'" style="font-family: 'Delicious Handrawn'">Estilo Chalkboard (Crayon)</option>
                    </optgroup>

                    <optgroup label="✍️ Clássicas e Manuscritas">
                        <option value="'Kalam'" style="font-family: 'Kalam'">Kalam (Realista)</option>
                        <option value="'Delius'" style="font-family: 'Delius'">Delius (Quadrinhos)</option>
                        <option value="'Homemade Apple'" style="font-family: 'Homemade Apple'">Homemade Apple</option>
                        <option value="'Tangerine'" style="font-family: 'Tangerine'">Tangerine</option>
                        <option value="'Amatic SC'" style="font-family: 'Amatic SC'">Amatic SC</option>
                        <option value="'Patrick Hand'" style="font-family: 'Patrick Hand'">Patrick Hand</option>
                        <option value="'Just Another Hand'" style="font-family: 'Just Another Hand'">Just Another Hand</option>
                        <option value="'Montserrat'" style="font-family: 'Montserrat'">Montserrat (Oficial ZAP48)</option>
                    </optgroup>
                    
                </select>
                
                <input type="text" id="inputText" placeholder="Escreva algo...">
                
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <div style="flex:1;">
                        <label style="font-size: 0.65rem;">Cor Letra:</label>
                        <input type="color" id="textColor" value="#8ACE00">
                    </div>
                    <div style="flex:1;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px;">
                            <label style="font-size: 0.65rem; margin:0;">Cor Borda:</label>
                            <label style="font-size: 0.6rem; margin:0; text-transform: none; display: flex; align-items: center; gap: 4px; cursor: pointer;">
                                <input type="checkbox" id="noOutline"> Sem borda
                            </label>
                        </div>
                        <input type="color" id="textOutlineColor" value="#000000">
                    </div>
                </div>
            </div>
            <button onclick="addText()">+ Inserir Texto</button>

            <hr>

            <div class="control-group">
                <label>⭐ Imagem como Sticker</label>
                <input type="file" id="uploadSticker" accept="image/*">
            </div>

            <div class="control-group">
                <div class="stickers-row">
                    <button class="sticker-btn" onclick="addStickerText('💖')">💖</button>
                    <button class="sticker-btn" onclick="addStickerText('✨')">✨</button>
                    <button class="sticker-btn" onclick="addStickerText('🌸')">🌸</button>
                    <button class="sticker-btn" onclick="addStickerText('🎀')">🎀</button>
                </div>
            </div>

            <button class="btn-download" onclick="downloadCard()">💾 Baixar Photocard</button>

        </aside>

        <section class="preview-area">
            <div id="photocard" class="photocard frame-polaroid">
                <div class="photo-container">
                    <span id="placeholder-text">Sua foto aqui</span>
                    <div id="photo" class="photo" style="display: none;"></div>
                </div>
                
                <div id="frameOverlay" class="frame-overlay-img"></div>
                <div id="elements-container"></div>
            </div>
        </section>

    </div>

    <script>
        const photocard = document.getElementById('photocard');
        const elementsContainer = document.getElementById('elements-container');
        const photoDiv = document.getElementById('photo');

        // FOTO E ZOOM
        document.getElementById('upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                photoDiv.style.backgroundImage = `url(${reader.result})`;
                photoDiv.style.display = 'block';
                document.getElementById('placeholder-text').style.display = 'none';
                document.getElementById('photoZoom').value = 1; 
                photoDiv.style.transform = 'scale(1)';
            }
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('photoZoom').addEventListener('input', function(e) {
            photoDiv.style.transform = `scale(${e.target.value})`;
        });

        // TROCAR MOLDURA E COR DE FUNDO
        document.getElementById('frameSelect').addEventListener('change', function() {
            photocard.className = 'photocard ' + this.value;
        });

        document.getElementById('cardBgColor').addEventListener('input', function(e) {
            photocard.style.backgroundColor = e.target.value;
            // Muda a cor da borda do kpop se quiserem combinar
            if(photocard.classList.contains('frame-kpop') || photocard.classList.contains('frame-pastel')) {
                photocard.style.borderColor = e.target.value;
            }
        });

        // MOLDURA PINTEREST
        document.getElementById('uploadFrame').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                const frameOverlay = document.getElementById('frameOverlay');
                frameOverlay.style.backgroundImage = `url(${reader.result})`;
                frameOverlay.style.display = 'block';
            }
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        // IMAGEM STICKER
        document.getElementById('uploadSticker').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() { addStickerImage(reader.result); }
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
            this.value = ''; 
        });

        // TEXTOS COM E SEM BORDA
        function addText() {
            const textValue = document.getElementById('inputText').value;
            if (!textValue) return;

            const color = document.getElementById('textColor').value;
            const outlineColor = document.getElementById('textOutlineColor').value;
            const font = document.getElementById('fontSelect').value;
            const noOutline = document.getElementById('noOutline').checked;

            const el = createDraggableElement(textValue, false);
            const contentSpan = el.querySelector('.content-span');
            contentSpan.style.color = color;
            contentSpan.style.fontFamily = font;
            
            // Aplica ou remove a borda baseada na checkbox
            if(!noOutline) {
                contentSpan.style.textShadow = `
                    -2px -2px 0 ${outlineColor}, 2px -2px 0 ${outlineColor}, 
                    -2px 2px 0 ${outlineColor}, 2px 2px 0 ${outlineColor},
                    0px 2px 0 ${outlineColor}, 2px 0px 0 ${outlineColor}, 
                    0px -2px 0 ${outlineColor}, -2px 0px 0 ${outlineColor}
                `;
            } else {
                contentSpan.style.textShadow = "none";
            }
            
            elementsContainer.appendChild(el);
            document.getElementById('inputText').value = '';
        }

        function addStickerText(emoji) {
            const el = createDraggableElement(emoji, false, true);
            elementsContainer.appendChild(el);
        }

        function addStickerImage(src) {
            const el = createDraggableElement(src, true);
            elementsContainer.appendChild(el);
        }

        // DRAG AND DROP E REDIMENSIONAR
        function createDraggableElement(content, isImage = false, isEmoji = false) {
            const div = document.createElement('div');
            div.className = 'draggable';
            div.dataset.isImage = isImage;
            
            let contentHtml = '';
            if(isImage) {
                contentHtml = `<img src="${content}" class="content-img" style="width: 100px; pointer-events: none;">`;
            } else {
                let defaultSize = isEmoji ? '45px' : '40px'; 
                contentHtml = `<span class="content-span" style="font-size: ${defaultSize}; white-space: nowrap;">${content}</span>`;
            }

            div.innerHTML = `
                ${contentHtml}
                <div class="ui-controls">
                    <div class="btn-action delete" onclick="this.closest('.draggable').remove()">X</div>
                    <div class="btn-action" onclick="resizeEl(this, 1)">+</div>
                    <div class="btn-action" onclick="resizeEl(this, -1)">-</div>
                </div>
            `;
            
            makeDraggable(div);
            return div;
        }

        function resizeEl(btn, direction) {
            const draggable = btn.closest('.draggable');
            const isImage = draggable.dataset.isImage === 'true';
            
            if(isImage) {
                const img = draggable.querySelector('.content-img');
                let currentWidth = parseInt(img.style.width);
                let newWidth = currentWidth + (direction * 15);
                if (newWidth > 20) img.style.width = newWidth + 'px';
            } else {
                const span = draggable.querySelector('.content-span');
                let currentSize = parseInt(span.style.fontSize);
                let newSize = currentSize + (direction * 5);
                if (newSize > 10) span.style.fontSize = newSize + 'px';
            }
        }

        function makeDraggable(element) {
            let isDragging = false;
            let startX, startY, initialLeft, initialTop;

            const startDrag = (e) => {
                if(e.target.classList.contains('btn-action')) return; 
                
                isDragging = true;
                const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

                const rect = element.getBoundingClientRect();
                const parentRect = photocard.getBoundingClientRect();
                
                element.style.transform = 'none';
                element.style.left = (rect.left - parentRect.left) + 'px';
                element.style.top = (rect.top - parentRect.top) + 'px';

                startX = clientX;
                startY = clientY;
                initialLeft = parseFloat(element.style.left) || 0;
                initialTop = parseFloat(element.style.top) || 0;
            };

            const drag = (e) => {
                if (!isDragging) return;
                e.preventDefault(); 
                
                const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

                const dx = clientX - startX;
                const dy = clientY - startY;

                element.style.left = `${initialLeft + dx}px`;
                element.style.top = `${initialTop + dy}px`;
            };

            const stopDrag = () => { isDragging = false; };

            element.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', stopDrag);
            element.addEventListener('touchstart', startDrag, {passive: false});
            document.addEventListener('touchmove', drag, {passive: false});
            document.addEventListener('touchend', stopDrag);
        }

        function downloadCard() {
            photocard.classList.add('hide-for-print');

            html2canvas(photocard, {
                scale: 3, 
                backgroundColor: null,
                useCORS: true 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'zap48-photocard.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                photocard.classList.remove('hide-for-print');
            });
        }
    </script>
</body>
</html>
